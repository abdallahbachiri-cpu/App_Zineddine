doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        # driver: 'pdo_pgsql'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        dql:
            numeric_functions:
                # acos: DoctrineExtensions\Query\Mysql\Acos
                # cos: DoctrineExtensions\Query\Mysql\Cos
                # asin: DoctrineExtensions\Query\Mysql\Asin
                # radians: DoctrineExtensions\Query\Mysql\Radians
                # rand: DoctrineExtensions\Query\Mysql\Rand
                # round: DoctrineExtensions\Query\Mysql\Round
                # sin: DoctrineExtensions\Query\Mysql\Sin

                # acos: App\Doctrine\Query\Postgresql\Acos
                # cos: App\Doctrine\Query\Postgresql\Acos
                # rand: App\Doctrine\Query\Postgresql\Random
                # radians: App\Doctrine\Query\Postgresql\Radians
                # sin: App\Doctrine\Query\Postgresql\Sin
                # earth_distance: App\Doctrine\Query\Postgresql\EarthDistanceFunction

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
